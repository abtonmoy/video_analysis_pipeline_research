# config/benchmark.yaml
#
# Benchmark-specific configuration.
# Inherits extraction/audio/ingestion settings from the main pipeline config
# which is loaded first, then this is merged on top.

benchmark:
  # Which baselines to run (comment out to disable)
  methods:
    - uniform_1fps
    - random
    - histogram
    - orb
    - optical_flow
    - clip_only
    - kmeans
    - hib_pipeline
    - static_pipeline

  # Baseline-specific thresholds
  thresholds:
    histogram_correlation: 0.95
    orb_good_matches: 40
    orb_match_distance: 50
    optical_flow_percentile: 85
    clip_cosine: 0.92 # different from pipeline's 0.90
    kmeans_seconds_per_cluster: 3

  # Shared CLIP infrastructure
  clip:
    model: "ViT-B-32"
    pretrained: "openai"
    device: "auto"
    batch_size: 32

  # Frame decoding settings
  video:
    max_resolution: 720
    sample_interval_ms: 100 # for pre-decoding all frames

  # Extraction provider (overrides main config if set)
  # Comment out to inherit from config/default.yaml
  extraction:
    provider: "gemini"
    model: "gemini-3-flash-preview"
    max_tokens: 4000
    temperature: 0.0
    retry:
      max_retries: 6
      base_delay: 2.0
      max_delay: 120.0

  # Output settings
  output:
    save_selected_frames: false
    save_per_video_json: true

# ---------------------------------------------------------------
# Audio settings — inherited from main config, included here
# so benchmark.yaml is self-contained when loaded standalone.
# ---------------------------------------------------------------
audio_analysis:
  enabled: true
  transcription:
    enabled: true
    model: "base"
  performance:
    skip_if_no_speech: true

# ---------------------------------------------------------------
# Ingestion — same as main pipeline
# ---------------------------------------------------------------
ingestion:
  max_resolution: 720
  extract_audio: true
