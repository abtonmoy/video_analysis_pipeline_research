#config/default.yaml

# Pipeline configuration with audio-enhanced extraction
pipeline:
  name: "audio-enhanced-ad-pipeline"
  version: "2.1.0"

# Video ingestion
ingestion:
  max_resolution: 720
  extract_audio: true # MUST be true for audio features

# Audio analysis (NEW!)
audio_analysis:
  enabled: true

  # Speech transcription
  transcription:
    enabled: true
    model: "base" # Options: tiny, base, small, medium, large
    language: "en"

  # Key phrase extraction
  key_phrases:
    enabled: true
    custom_keywords:
      - "off"
      - "sale"
      - "discount"
      - "free"
      - "limited"
      - "today"
      - "now"
      - "call"
      - "visit"
      - "sign up"
      - "download"

  # Speech detection
  speech_detection:
    enabled: true
    aggressiveness: 2 # 0-3, higher = more aggressive VAD

  # Music analysis
  tempo_analysis:
    enabled: true

  mood_classification:
    enabled: true
    use_ml: false # Set to true for ML-based mood (requires additional deps)

  # Performance tuning
  performance:
    # Skip transcription for videos without speech (saves time)
    skip_if_no_speech: true

    # Cache audio analysis results
    cache_results: true
    cache_dir: "outputs/audio_cache"

# Change detection
change_detection:
  method: "histogram"
  threshold: 0.15
  min_interval_ms: 100

# Scene detection
scene_detection:
  method: "content"
  threshold: 27.0
  min_scene_length_s: 0.5

  fallback:
    enabled: true
    threshold: 15.0
    artificial_chunks: true
    chunk_size_s: 10.0

# Hierarchical deduplication
deduplication:
  phash:
    enabled: true
    threshold: 8
  ssim:
    enabled: true
    threshold: 0.92
  clip:
    enabled: true
    model: "ViT-B/32"
    threshold: 0.90
    device: "cpu"
    batch_size: 32

# Frame selection with audio-aware importance scoring
selection:
  method: "clustering"

  target_frame_density: 0.25
  min_frames_per_scene: 2
  max_frames_per_scene: 10
  min_temporal_gap_s: 0.5

  adaptive_density: true

  # Audio-based importance boosting (NEW!)
  audio_importance:
    enabled: true
    boost_near_speech: 1.3 # Boost frames near speech start/end
    boost_near_key_phrases: 1.5 # Boost frames near promotional keywords
    boost_after_silence: 1.4 # Boost frames after silence (attention reset)
    proximity_threshold_s: 0.5 # How close to audio event to apply boost

# LLM extraction with audio context
extraction:
  provider: "gemini"
  model: "gemini-2.0-flash-exp"
  max_tokens: 2000
  temperature: 0.0

  # Audio context integration (NEW!)
  audio_context:
    enabled: true
    include_transcription: true
    include_key_phrases: true
    include_mood: true
    max_transcription_segments: 10 # Limit for token efficiency

  # Temporal reasoning
  temporal_context:
    enabled: true
    include_timestamps: true
    include_time_deltas: true
    include_position_labels: true
    include_narrative_instructions: true

  # Schema configuration
  schema:
    mode: "adaptive" # Options: adaptive, fixed, flexible

# Batch processing
batch:
  enabled: true
  max_workers: 1
  gpu_batch_size: 32

# Evaluation
evaluation:
  metrics:
    - frame_reduction_rate
    - api_cost_reduction
    - processing_time
    - extraction_accuracy
    - audio_enhancement_impact # NEW!
  save_intermediate: true

# Logging
logging:
  level: "INFO"
  log_file: null
