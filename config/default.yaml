#config/default.yaml

# Pipeline configuration with density-based adaptive frame selection
pipeline:
  name: "adaptive-ad-pipeline"
  version: "2.0.0"

# Video ingestion
ingestion:
  max_resolution: 720 # Downscale if larger
  extract_audio: true

# Change detection
change_detection:
  method: "histogram" # Options: frame_diff, histogram, edge
  threshold: 0.15
  min_interval_ms: 100 # Minimum time between candidates

# Scene detection with fallback
scene_detection:
  method: "content" # Options: content, threshold, transnet
  threshold: 27.0
  min_scene_length_s: 0.5

  # Fallback when no scenes detected (e.g., static/dark videos)
  fallback:
    enabled: true
    threshold: 15.0 # Much lower threshold for retry
    artificial_chunks: true # If still no scenes, split into chunks
    chunk_size_s: 10.0 # Size of artificial chunks

# Hierarchical deduplication
deduplication:
  phash:
    enabled: true
    threshold: 8 # Hamming distance
  ssim:
    enabled: true
    threshold: 0.92
  clip:
    enabled: true
    model: "ViT-B/32"
    threshold: 0.90
    device: "cpu" # Options: cuda, cpu, auto
    batch_size: 32 # GPU batching for efficiency

# Representative selection (DENSITY-BASED - NEW!)
selection:
  method: "clustering" # Options: clustering, uniform, first

  # Density-based allocation (replaces fixed max_frames_per_scene)
  # Allocates frames proportionally to scene duration
  target_frame_density:
    0.25 # ~1 frame every 4 seconds of scene duration
    # Examples:
    #   10s scene → 2-3 frames
    #   30s scene → 7-8 frames
    #   60s scene → 10 frames (capped)

  # Per-scene constraints
  min_frames_per_scene: 2 # Always capture at least start/end
  max_frames_per_scene: 10 # Cap for very long scenes (40s+)

  # Temporal constraints
  min_temporal_gap_s: 0.5 # Minimum time between selected frames

  # Adaptive density based on scene complexity
  adaptive_density:
    true # Adjust density based on frame variance
    # High variance (action) → 30% more frames
    # Low variance (static) → 30% fewer frames

# LLM extraction
extraction:
  provider: "gemini" # Options: anthropic, openai, gemini
  model: "gemini-2.0-flash-exp"
  # provider: "anthropic"
  # model: "claude-sonnet-4-20250514"
  max_tokens: 2000
  temperature: 0.0

  # Temporal reasoning
  temporal_context:
    enabled: true
    include_timestamps: true
    include_time_deltas: true
    include_position_labels: true # [OPENING], [CLOSING]
    include_narrative_instructions: true

  # Adaptive schema
  schema:
    mode: "adaptive" # Options: adaptive, fixed, flexible
    # For adaptive mode: two-pass (detect type, then extract)
    # For fixed mode: use schema_name
    # For flexible mode: universal schema with optional fields
    schema_name: "full" # Used when mode=fixed
    confidence_sampling:
      enabled: false
      n_samples: 3
      temperature: 0.3

# Batch processing
batch:
  enabled: true
  max_workers: 1 # Sequential to avoid multiprocessing issues
  gpu_batch_size: 32 # CLIP embedding batch size

# Evaluation
evaluation:
  metrics:
    - frame_reduction_rate
    - api_cost_reduction
    - processing_time
    - extraction_accuracy
  save_intermediate: true

# Logging
logging:
  level: "INFO" # DEBUG, INFO, WARNING, ERROR
  log_file: null # Set path to enable file logging
